    package tracker.model;

    import tracker.utils.TrackerHelperFunction;

    import java.util.Objects;

    public class Course {

        private final String name;
        private Long points;
        private final Long maxPoints;

        public Course(String name) {
            this.name = name;
            this.maxPoints = TrackerHelperFunction.getMaxPoints(name);
        }

        public Course(String name, long points) {
            this(name);
            this.points = points;
        }

        public String getName() {
            return name;
        }

        public Long getPoints() {
            return points;
        }

        public void updatePoints(long points) {
            this.points += points;
        }

        public boolean isEnrolled() {
            return points > 0;
        }

        public Long getMaxPoints() {
            return maxPoints;
        }

        @Override
        public boolean equals(Object o) {
            if (this == o) return true;
            if (!(o instanceof Course)) return false;
            Course course = (Course) o;
            return Objects.equals(getName(), course.getName()) && Objects.equals(getPoints(), course.getPoints()) &&
                    Objects.equals(getMaxPoints(), course.getMaxPoints());
        }

        @Override
        public int hashCode() {
            return Objects.hash(getName(), getPoints(), getMaxPoints());
        }

        @Override
        public String toString() {
            return "Course{" +
                    "name='" + name + '\'' +
                    ", points=" + points +
                    '}';
        }
    }
